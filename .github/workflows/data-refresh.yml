# .github/workflows/data-refresh.yml
name: Weekly Data Refresh

on:
  schedule:
    - cron: '0 11 * * 3'  # Every Wednesday at 11:00 AM UTC (after MNF data is published)
  workflow_dispatch:
    inputs:
      season:
        description: 'Season to refresh (default: current)'
        required: false
        default: ''

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Check for offseason
        id: offseason
        if: github.event_name == 'schedule'
        run: |
          MONTH=$(date +%m)
          # NFL offseason: February through early September (no new data)
          if [ "$MONTH" -ge 3 ] && [ "$MONTH" -le 8 ]; then
            echo "::notice::NFL offseason (month $MONTH) — skipping refresh"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Resolve season
        if: steps.offseason.outputs.skip != 'true'
        id: vars
        run: |
          INPUT="${{ github.event.inputs.season }}"
          if [ -n "$INPUT" ]; then
            echo "season=$INPUT" >> $GITHUB_OUTPUT
          else
            # Auto-detect: NFL season starts in September
            MONTH=$(date +%m)
            YEAR=$(date +%Y)
            if [ "$MONTH" -ge 9 ]; then
              echo "season=$YEAR" >> $GITHUB_OUTPUT
            else
              echo "season=$((YEAR - 1))" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run ingest
        if: steps.offseason.outputs.skip != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/ingest.py --season "${{ steps.vars.outputs.season }}"

      - name: Trigger ISR revalidation
        if: success() && steps.offseason.outputs.skip != 'true'
        run: |
          if [ -z "${{ secrets.SITE_URL }}" ]; then
            echo "::notice::SITE_URL not configured — skipping revalidation (site may not be deployed yet)"
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.SITE_URL }}/api/revalidate" \
            -H "x-revalidate-secret: ${{ secrets.REVALIDATE_SECRET }}" \
            -H "Content-Type: application/json")
          echo "Revalidation response: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::ISR revalidation failed with HTTP $STATUS — site may serve stale data"
          fi
