# .github/workflows/seed.yml
name: Seed Historical Data

on:
  workflow_dispatch:
    inputs:
      seasons:
        description: 'Comma-separated seasons to load'
        required: false
        default: '2020,2021,2022,2023,2024,2025'

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Seed each season
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          IFS=',' read -ra SEASONS <<< "${{ github.event.inputs.seasons }}"
          FAILED=()
          for season in "${SEASONS[@]}"; do
            echo "Processing season $season..."
            if ! python scripts/ingest.py --season "$season"; then
              echo "::warning::Season $season failed"
              FAILED+=("$season")
            fi
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::Failed seasons: ${FAILED[*]}"
            exit 1
          fi

      - name: Trigger ISR revalidation
        if: success()
        run: |
          if [ -z "${{ secrets.SITE_URL }}" ]; then
            echo "::notice::SITE_URL not configured — skipping revalidation"
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.SITE_URL }}/api/revalidate" \
            -H "x-revalidate-secret: ${{ secrets.REVALIDATE_SECRET }}" \
            -H "Content-Type: application/json")
          echo "Revalidation response: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::ISR revalidation failed with HTTP $STATUS — site may serve stale data"
          fi
